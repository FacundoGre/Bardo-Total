<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" width="100%" height="100%">
  <defs>
    <!-- Gradiente Gris Acero Oscuro (Para "ENFRENTAR A LA") -->
    <linearGradient id="titleIron" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f1f5f9" />
      <stop offset="30%" stop-color="#94a3b8" />
      <stop offset="75%" stop-color="#334155" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Gradiente Rojo Furia Texturizado (Para "BESTIA") -->
    <linearGradient id="titleBeast" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" />
      <stop offset="20%" stop-color="#e11d48" />
      <stop offset="60%" stop-color="#9f1239" />
      <stop offset="100%" stop-color="#4c0519" />
    </linearGradient>

    <!-- Gradiente para la Placa de Metal de Fondo -->
    <linearGradient id="plateMetal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Sombra pesada para que despegue del fondo de la pantalla del evento -->
    <filter id="panelShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="6" flood-color="#000000" flood-opacity="0.95" />
    </filter>
  </defs>

  <style>
    .font-brute { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; text-anchor: middle; font-style: italic; }
    .top-txt { font-size: 65px; letter-spacing: 5px; }
    .main-txt { font-size: 130px; letter-spacing: 6px; }
    .stroke-darkest { stroke: #050202; stroke-width: 26px; stroke-linejoin: round; stroke-linecap: round; }
    .stroke-mid { stroke: #1e080e; stroke-width: 14px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <!-- CONTENEDOR CON SOMBRA -->
  <g filter="url(#panelShadow)">
    
    <!-- PLACA DE METAL DE FONDO (Marco de la interfaz del evento) -->
    <g transform="translate(500, 170)">
      <!-- Placa base con picos y muescas agresivas -->
      <path d="M -440,-80 L -380,-110 L 380,-110 L 440,-80 L 410,60 L 250,110 L -250,110 L -410,60 Z" fill="url(#plateMetal)" stroke="#0f172a" stroke-width="8" stroke-linejoin="round" />
      
      <!-- Borde interno de la placa (Efecto relieve) -->
      <path d="M -425,-82 L -372,-100 L 372,-100 L 425,-82 L 398,52 L 245,98 L -245,98 L -398,52 Z" fill="none" stroke="#64748b" stroke-width="3" opacity="0.4" />
      
      <!-- Remaches/Tornillos de la placa gastada -->
      <circle cx="-380" cy="-85" r="6" fill="#64748b" stroke="#000" stroke-width="2" />
      <circle cx="380" cy="-85" r="6" fill="#64748b" stroke="#000" stroke-width="2" />
      <circle cx="-390" cy="40" r="6" fill="#64748b" stroke="#000" stroke-width="2" />
      <circle cx="390" cy="40" r="6" fill="#64748b" stroke="#000" stroke-width="2" />
      <circle cx="-240" cy="85" r="6" fill="#64748b" stroke="#000" stroke-width="2" />
      <circle cx="240" cy="85" r="6" fill="#64748b" stroke="#000" stroke-width="2" />

      <!-- Grietas de destrucción en la placa de metal -->
      <path d="M -300,-110 L -280,-85 L -295,-70 M 200,100 L 215,75 L 205,60 M -420,-20 L -380,-15" stroke="#000" stroke-width="4" fill="none" stroke-linecap="round" />
      
      <!-- Manchas de sangre vieja sobre el metal -->
      <path d="M 300,-40 Q 330,-45 350,-20 Q 310,-10 300,-40 Z M -350,10 Q -330,30 -320,50 Q -350,40 -350,10 Z" fill="#4c0519" opacity="0.7" />
    </g>

    <!-- DETALLES DE GARRAS DELANTERAS (Cruzan la placa antes del texto) -->
    <g transform="translate(500, 170)" fill="none" stroke="#7f1d1d" stroke-width="12" stroke-linecap="round" opacity="0.5">
      <!-- Desgarros que cruzan diagonalmente el centro -->
      <path d="M -150,-130 L -100,120" />
      <path d="M -100,-140 L -50,110" />
      <path d="M -50,-130 L 0,120" />
    </g>

    <!-- TEXTO SUPERIOR: "ENFRENTAR A LA" -->
    <g transform="translate(500, 110)">
      <text y="0" class="font-brute top-txt stroke-darkest" fill="#000">ENFRENTAR A LA</text>
      <text y="0" class="font-brute top-txt stroke-mid" fill="#000">ENFRENTAR A LA</text>
      <text y="0" class="font-brute top-txt" fill="url(#titleIron)">ENFRENTAR A LA</text>
    </g>

    <!-- TEXTO PRINCIPAL: "BESTIA" -->
    <g transform="translate(506, 235)">
      <!-- Un toque a la derecha por la itálica del Impact -->
      <text y="0" class="font-brute main-txt stroke-darkest" fill="#000">BESTIA</text>
      <text y="0" class="font-brute main-txt stroke-mid" fill="#000">BESTIA</text>
      <text y="0" class="font-brute main-txt" fill="url(#titleBeast)">BESTIA</text>
    </g>

    <!-- SALPICADURAS DE SANGRE FRESCA (Por encima del texto para integrarlo) -->
    <g transform="translate(500, 170)" fill="#b91c1c" opacity="0.8">
      <circle cx="-160" cy="50" r="5" />
      <circle cx="-145" cy="70" r="3" />
      <path d="M 180,30 Q 210,55 230,50 Q 200,40 180,30 Z" />
      <circle cx="235" cy="60" r="4" />
    </g>

  </g>
</svg>
