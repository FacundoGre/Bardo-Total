<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="100%" height="100%">
  <defs>
    <!-- Gradiente de Acero para las Espadas Cruzadas -->
    <linearGradient id="attackSteel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Gradiente de Oro para las Guardas y Pomos -->
    <linearGradient id="attackGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef08a" />
      <stop offset="100%" stop-color="#ca8a04" />
    </linearGradient>

    <!-- Sombra pesada para que el texto e icono floten con fuerza sobre la UI -->
    <filter id="attackDropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.95" />
    </filter>
  </defs>

  <style>
    .font-brute-attack { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; font-style: italic; font-size: 82px; letter-spacing: 3px; }
    .stroke-black-heavy { stroke: #000000; stroke-width: 20px; stroke-linejoin: round; stroke-linecap: round; }
    .stroke-dark-iron { stroke: #1e293b; stroke-width: 8px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <!-- CONTENEDOR CON SOMBRA (Para todo el bloque) -->
  <g filter="url(#attackDropShadow)">
    
    <!-- EMOJI VECTORIAL: ESPADAS CRUZADAS (⚔️) -->
    <!-- Inclinado levemente a 12 grados para emparejar la itálica del Impact -->
    <g transform="translate(75, 70) rotate(12) scale(1.1)">
      <!-- Espada 1 (Inclinada hacia la derecha) -->
      <g transform="rotate(45)">
        <path d="M -4,-55 L 0,-65 L 4,-55 L 4,10 L -4,10 Z" fill="url(#attackSteel)" stroke="#000000" stroke-width="3" />
        <path d="M -12,10 L 12,10 L 8,16 L -8,16 Z" fill="url(#attackGold)" stroke="#000000" stroke-width="3" />
        <rect x="-2.5" y="16" width="5" height="18" rx="1" fill="#451a03" stroke="#000000" stroke-width="2" />
        <circle cx="0" cy="37" r="5" fill="url(#attackGold)" stroke="#000000" stroke-width="2" />
      </g>
      
      <!-- Espada 2 (Inclinada hacia la izquierda) -->
      <g transform="rotate(-45)">
        <path d="M -4,-55 L 0,-65 L 4,-55 L 4,10 L -4,10 Z" fill="url(#attackSteel)" stroke="#000000" stroke-width="3" />
        <path d="M -12,10 L 12,10 L 8,16 L -8,16 Z" fill="url(#attackGold)" stroke="#000000" stroke-width="3" />
        <rect x="-2.5" y="16" width="5" height="18" rx="1" fill="#451a03" stroke="#000000" stroke-width="2" />
        <circle cx="0" cy="37" r="5" fill="url(#attackGold)" stroke="#000000" stroke-width="2" />
      </g>
    </g>

    <!-- TEXTO PRINCIPAL: "ATACAR" -->
    <!-- Desplazado a la derecha para dejarle su lugar al icono -->
    <g transform="translate(145, 96)">
      <!-- Delineado negro ultra grueso de fondo -->
      <text class="font-brute-attack stroke-black-heavy" fill="#000000">ATACAR</text>
      <!-- Delineado de acero oscuro intermedio para dar volumen -->
      <text class="font-brute-attack stroke-dark-iron" fill="#000000">ATACAR</text>
      <!-- Relleno Blanco Pleno Solicitado -->
      <text class="font-brute-attack" fill="#ffffff">ATACAR</text>
    </g>

  </g>
</svg>
