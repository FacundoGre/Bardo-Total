<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" height="100%">
  <defs>
    <!-- Gradiente para el texto SASTRE (Cuero Violeta / Facha) -->
    <linearGradient id="tailorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#dfa5ff" />
      <stop offset="30%" stop-color="#a23ce6" />
      <stop offset="70%" stop-color="#561385" />
      <stop offset="100%" stop-color="#210038" />
    </linearGradient>

    <!-- Gradiente de Oro Viejo para detalles y bordes -->
    <linearGradient id="tailorGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff2a3" />
      <stop offset="50%" stop-color="#d47a00" />
      <stop offset="100%" stop-color="#5a2e00" />
    </linearGradient>

    <!-- Gradiente de Metal para las Tijeras -->
    <linearGradient id="tailorIron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Sombra del botón -->
    <filter id="tailorShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.9" />
    </filter>
  </defs>

  <style>
    .font-brute { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; text-anchor: middle; font-style: italic; }
    .sastre-txt { font-size: 115px; letter-spacing: 8px; }
    .out-heavy { stroke: #0c0410; stroke-width: 24px; stroke-linejoin: round; stroke-linecap: round; }
    .out-mid { stroke: #230831; stroke-width: 12px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <!-- CONTENEDOR CON SOMBRA -->
  <g filter="url(#tailorShadow)">
    
    <!-- ELEMENTOS DE FONDO (Tijeras y Aguja de Sastre) -->
    <g transform="translate(450, 110)">
      
      <!-- Aguja Gigante Cruzada Izquierda -->
      <g transform="translate(-240, -5) rotate(-35) scale(0.8)">
        <!-- Cuerpo de la aguja -->
        <path d="M -4,-110 L 4,-110 Q 4,60 1,110 L -1,110 Q -4,60 -4,-110 Z" fill="url(#tailorIron)" stroke="#111" stroke-width="4" />
        <!-- Ojo de la aguja -->
        <ellipse cx="0" cy="-85" rx="2" ry="12" fill="#111" />
        <!-- Hilo rojo pasando por la aguja -->
        <path d="M 0,-110 Q -30,-140 -10,-170 Q 10,-140 0,-85 Q -20,-40 -50,-20" fill="none" stroke="#dc2626" stroke-width="5" stroke-linecap="round" />
      </g>

      <!-- Tijeras Medievales Derecha -->
      <g transform="translate(240, 5) rotate(40) scale(0.75)">
        <!-- Hoja 1 -->
        <path d="M 0,0 L 20,-110 L 5,-120 L -10,-20 Z" fill="url(#tailorIron)" stroke="#111" stroke-width="4" />
        <!-- Hoja 2 -->
        <path d="M -5,0 L -25,-110 L -10,-120 L 5,-20 Z" fill="url(#tailorIron)" stroke="#111" stroke-width="4" />
        <!-- Mango / Anillos de la tijera -->
        <circle cx="25" cy="30" r="25" fill="none" stroke="url(#tailorGold)" stroke-width="10" />
        <circle cx="25" cy="30" r="25" fill="none" stroke="#111" stroke-width="2" />
        <circle cx="-25" cy="35" r="25" fill="none" stroke="url(#tailorGold)" stroke-width="10" />
        <circle cx="-25" cy="35" r="25" fill="none" stroke="#111" stroke-width="2" />
        <!-- Tornillo central -->
        <circle cx="0" cy="-10" r="6" fill="#475569" stroke="#111" stroke-width="3" />
      </g>

      <!-- Pequeño detalle de costura/puntos flotando de fondo -->
      <path d="M -150,-60 L -80,-60 M 100,75 L 180,75" stroke="#ffd700" stroke-width="4" stroke-dasharray="10,8" stroke-linecap="round" opacity="0.5" />
    </g>

    <!-- TEXTO PRINCIPAL: "SASTRE" -->
    <g transform="translate(456, 150)"> 
      <!-- Desplazado 6px a la derecha por la inclinación -->
      <text y="0" class="font-brute sastre-txt out-heavy" fill="#000">SASTRE</text>
      <text y="0" class="font-brute sastre-txt out-mid" fill="#000">SASTRE</text>
      <text y="0" class="font-brute sastre-txt" fill="url(#tailorGrad)">SASTRE</text>
    </g>
    
  </g>
</svg>
