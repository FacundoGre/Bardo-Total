<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="100%" height="100%">
  <defs>
    <!-- Gradiente Gris Metal para el Fondo del Botón Compacto -->
    <linearGradient id="logoutGreyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#64748b" />
      <stop offset="50%" stop-color="#334155" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>

    <!-- Gradiente Blanco/Plata de Alta Legibilidad para el Texto Chico -->
    <linearGradient id="logoutTextGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="40%" stop-color="#e2e8f0" />
      <stop offset="100%" stop-color="#94a3b8" />
    </linearGradient>

    <!-- Sombra suave para botones de interfaz secundarios -->
    <filter id="logoutShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="3" flood-color="#000000" flood-opacity="0.85" />
    </filter>
  </defs>

  <style>
    .font-brute-sm { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; font-style: italic; }
    .logout-txt { font-size: 44px; letter-spacing: 1px; }
    .out-heavy-sm { stroke: #020617; stroke-width: 14px; stroke-linejoin: round; stroke-linecap: round; }
    .out-mid-sm { stroke: #1e293b; stroke-width: 6px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <!-- CONTENEDOR CON SOMBRA PROYECTADA -->
  <g filter="url(#logoutShadow)">
    
    <!-- PLACA CENTRAL (Botón Gris de Hierro) -->
    <g transform="translate(225, 60)">
      <!-- Rectángulo rústico de metal remachado -->
      <path d="M -200,-35 L -185,-45 L 185,-45 L 200,-35 L 190,30 L 175,40 L -175,40 L -190,30 Z" fill="url(#logoutGreyBg)" stroke="#0f172a" stroke-width="4" stroke-linejoin="round" />
      
      <!-- Bisel interno sutil -->
      <path d="M -188,-36 L -175,-41 L 175,-41 L 188,-36 L 180,28 L 168,35 L -168,35 L -180,28 Z" fill="none" stroke="#94a3b8" stroke-width="1.5" opacity="0.3" />

      <!-- Remaches en las esquinas -->
      <circle cx="-175" cy="-32" r="3" fill="#1e293b" stroke="#000" stroke-width="1" />
      <circle cx="175" cy="-32" r="3" fill="#1e293b" stroke="#000" stroke-width="1" />
      <circle cx="-165" cy="28" r="3" fill="#1e293b" stroke="#000" stroke-width="1" />
      <circle cx="175" cy="28" r="3" fill="#1e293b" stroke="#000" stroke-width="1" />
    </g>

    <!-- ICONO VECTORIAL DE SALIDA (Puerta y Flecha de escape a la izquierda) -->
    <g transform="translate(55, 60) scale(0.85)" stroke-linejoin="round" stroke-linecap="round">
      <!-- Marco de la puerta/calabozo -->
      <path d="M -10,20 L -10,-20 L 12,-20 L 12,-10 M 12,5 L 12,20 L -10,20" fill="none" stroke="#0f172a" stroke-width="7" />
      <path d="M -10,20 L -10,-20 L 12,-20 L 12,-10 M 12,5 L 12,20 L -10,20" fill="none" stroke="#94a3b8" stroke-width="3" />
      
      <!-- Flecha saliendo hacia la izquierda -->
      <path d="M 22,0 L -2,0 M 5,-7 L -2,0 L 5,7" fill="none" stroke="#000" stroke-width="7" />
      <path d="M 22,0 L -2,0 M 5,-7 L -2,0 L 5,7" fill="none" stroke="#f1f5f9" stroke-width="3" />
    </g>

    <!-- TEXTO: "CERRAR SESIÓN" (Alineado para convivir con el icono) -->
    <g transform="translate(255, 75)">
      <text class="font-brute-sm logout-txt out-heavy-sm" text-anchor="middle">CERRAR SESIÓN</text>
      <text class="font-brute-sm logout-txt out-mid-sm" text-anchor="middle">CERRAR SESIÓN</text>
      <text class="font-brute-sm logout-txt" fill="url(#logoutTextGrad)" text-anchor="middle">CERRAR SESIÓN</text>
    </g>

  </g>
</svg>
