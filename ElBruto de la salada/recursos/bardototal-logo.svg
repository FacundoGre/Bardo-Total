<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff2a3" />
      <stop offset="30%" stop-color="#ffd043" />
      <stop offset="70%" stop-color="#d47a00" />
      <stop offset="100%" stop-color="#5a2e00" />
    </linearGradient>

    <linearGradient id="bloodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6b6b" />
      <stop offset="40%" stop-color="#e60000" />
      <stop offset="100%" stop-color="#5e0000" />
    </linearGradient>

    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8a7667" />
      <stop offset="50%" stop-color="#4a3b32" />
      <stop offset="100%" stop-color="#1f1610" />
    </linearGradient>

    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.8" />
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    .font-heavy { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; text-anchor: middle; }
    .bardo-text { font-size: 110px; font-style: italic; letter-spacing: 2px; }
    .total-text { font-size: 75px; font-style: italic; letter-spacing: 12px; }
    .stroke-black { stroke: #000; stroke-width: 14px; stroke-linejoin: round; stroke-linecap: round; }
    .stroke-thick { stroke: #111; stroke-width: 24px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <g filter="url(#dropShadow)">
    
    <g transform="translate(400, 230)">
      <g transform="rotate(-35)">
        <path d="M -15,-150 L 15,-150 L 25,40 L 10,160 L -10,160 L -25,40 Z" fill="#7a5335" stroke="#1a0f07" stroke-width="6" stroke-linejoin="round"/>
        <polygon points="-15,-120 -35,-125 -18,-100" fill="#d6d6d6" stroke="#000" stroke-width="4"/>
        <polygon points="15,-100 35,-105 18,-80" fill="#d6d6d6" stroke="#000" stroke-width="4"/>
        <polygon points="-20,-70 -40,-75 -22,-50" fill="#d6d6d6" stroke="#000" stroke-width="4"/>
        <polygon points="20,-40 40,-45 22,-20" fill="#d6d6d6" stroke="#000" stroke-width="4"/>
      </g>

      <g transform="rotate(35)">
        <path d="M -12,-160 L 0,-185 L 12,-160 L 15,-60 L 8,-50 L 15,40 L 8,110 L -8,110 L -15,40 L -8,-50 L -15,-60 Z" fill="#b0b5b8" stroke="#1a202c" stroke-width="6" stroke-linejoin="round"/>
        <line x1="0" y1="-175" x2="0" y2="110" stroke="#718096" stroke-width="3"/>
        <rect x="-35" y="110" width="70" height="15" rx="4" fill="#d47a00" stroke="#000" stroke-width="4"/>
        <rect x="-8" y="125" width="16" height="40" fill="#5a2e00" stroke="#000" stroke-width="4"/>
        <circle cx="0" cy="170" r="12" fill="#d47a00" stroke="#000" stroke-width="4"/>
      </g>
      
      <path d="M -90,-90 L 90,-90 L 110,10 C 110,70 60,130 0,160 C -60,130 -110,70 -110,10 Z" fill="url(#metalGrad)" stroke="#111" stroke-width="10" stroke-linejoin="round"/>
      <path d="M -75,-75 L 75,-75 L 92,10 C 92,60 50,110 0,135 C -50,110 -92,60 -92,10 Z" fill="none" stroke="#2b1f17" stroke-width="4" stroke-dasharray="10,6"/>
      <path d="M -50,-40 L -20,-30 M 40,-20 L 60,-10 M -30,40 L -10,35" stroke="#111" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g fill="#8a0000" opacity="0.85" transform="translate(400, 230)">
      <circle cx="-130" cy="40" r="8" />
      <path d="M -130,40 Q -140,70 -155,80 Q -145,55 -130,40 Z"/>
      <circle cx="140" cy="-60" r="6" />
      <path d="M 120,60 Q 150,90 170,85 Q 145,75 120,60 Z"/>
    </g>

    <g transform="translate(400, 210)">
      <text y="0" class="font-heavy bardo-text stroke-thick" fill="#000">BARDO</text>
      <text y="0" class="font-heavy bardo-text stroke-black" fill="#000">BARDO</text>
      <text y="0" class="font-heavy bardo-text" fill="url(#goldGrad)">BARDO</text>
    </g>

    <g transform="translate(400, 290)">
      <text y="0" class="font-heavy total-text stroke-thick" fill="#000">TOTAL</text>
      <text y="0" class="font-heavy total-text stroke-black" fill="#000">TOTAL</text>
      <text y="0" class="font-heavy total-text" fill="url(#bloodGrad)" filter="url(#glow)">TOTAL</text>
    </g>

    <g transform="translate(400, 210)" fill="#ffffff" opacity="0.4">
      <path d="M -195,-55 L -165,-75 L -175,-75 Z" />
      <path d="M -95,-55 L -75,-75 L -85,-75 Z" />
    </g>
    
  </g>
</svg>
