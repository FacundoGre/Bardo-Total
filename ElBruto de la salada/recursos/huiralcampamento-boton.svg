<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="100%" height="100%">
  <defs>
    <!-- Gradiente Gris Desgastado para el Fondo del Botón -->
    <linearGradient id="escapeGreyBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8" />
      <stop offset="40%" stop-color="#475569" />
      <stop offset="85%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <!-- Gradiente de Alerta / Cobre Oxidado para el Texto (Pega genial con el Gris) -->
    <linearGradient id="escapeRustGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffedd5" />
      <stop offset="30%" stop-color="#f97316" />
      <stop offset="75%" stop-color="#ea580c" />
      <stop offset="100%" stop-color="#7c2d12" />
    </linearGradient>

    <!-- Gradiente de Acero para las Flechas de la Bestia -->
    <linearGradient id="arrowIron" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#334155" />
    </linearGradient>

    <!-- Sombra proyectada pesada para la acción de escape -->
    <filter id="escapeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="4" flood-color="#000000" flood-opacity="0.9" />
    </filter>
  </defs>

  <style>
    .font-brute { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; text-anchor: middle; font-style: italic; }
    .escape-txt { font-size: 76px; letter-spacing: 2px; }
    .out-heavy { stroke: #020617; stroke-width: 22px; stroke-linejoin: round; stroke-linecap: round; }
    .out-mid { stroke: #431407; stroke-width: 10px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <!-- CONTENEDOR PRINCIPAL CON SOMBRA -->
  <g filter="url(#escapeShadow)">
    
    <!-- DETALLES DE ESCAPE DE DETRÁS (Flechas enemigas y polvo) -->
    <g transform="translate(450, 110)">
      <!-- Estelas de velocidad/polvo hacia la izquierda (Huyendo) -->
      <path d="M -410,-20 L -370,-20 M -430,10 L -380,10 M -400,35 L -360,35" stroke="#64748b" stroke-width="6" stroke-linecap="round" opacity="0.4" />
      
      <!-- Flecha Clavada Izquierda (Ataque de la Bestia que esquivaste) -->
      <g transform="translate(-360, -30) rotate(-15) scale(0.7)">
        <rect x="-2" y="-40" width="4" height="80" fill="#78350f" stroke="#000" stroke-width="2" />
        <path d="M -10,30 L 0,50 L 10,30 Z" fill="url(#arrowIron)" stroke="#000" stroke-width="2" />
        <path d="M -6,-40 L -12,-55 L -2,-50 L 0,-40" fill="#94a3b8" />
        <path d="M 6,-40 L 12,-55 L 2,-50 L 0,-40" fill="#94a3b8" />
      </g>

      <!-- Flecha Clavada Derecha -->
      <g transform="translate(360, 20) rotate(25) scale(0.7)">
        <rect x="-2" y="-40" width="4" height="80" fill="#78350f" stroke="#000" stroke-width="2" />
        <path d="M -10,30 L 0,50 L 10,30 Z" fill="url(#arrowIron)" stroke="#000" stroke-width="2" />
        <path d="M -6,-40 L -12,-55 L -2,-50 L 0,-40" fill="#94a3b8" />
      </g>
    </g>

    <!-- EL BOTÓN CENTRAL: ESTANDARTE GRIS HIERRO -->
    <g transform="translate(450, 110)">
      <!-- Rectángulo rústico gris, inclinado hacia la izquierda simulando movimiento -->
      <path d="M -350,-50 L -310,-65 L 340,-65 L 360,-50 L 330,45 L 290,55 L -330,55 L -350,40 Z" fill="url(#escapeGreyBg)" stroke="#0f172a" stroke-width="6" stroke-linejoin="round" />
      
      <!-- Costura de cuero interna reforzada -->
      <path d="M -332,-50 L -300,-58 L 325,-58 L 342,-50 L 318,38 L 285,46 L -318,46 L -335,38 Z" fill="none" stroke="#0f172a" stroke-width="3" stroke-dasharray="8,8" opacity="0.6" />
      
      <!-- Raspones profundos de garras de la Bestia en la placa gris -->
      <path d="M -180,-40 L -165,-15 M -170,-42 L -155,-17 M 210,-10 L 235,20 M 220,-12 L 245,18" stroke="#020617" stroke-width="4" stroke-linecap="round" opacity="0.6" />
    </g>

    <!-- TEXTO PRINCIPAL: "HUIR AL CAMPAMENTO" -->
    <g transform="translate(454, 136)">
      <!-- Doble capa de delineado para separarlo agresivamente del fondo gris -->
      <text y="0" class="font-brute escape-txt out-heavy" fill="#000">HUIR AL CAMPAMENTO</text>
      <text y="0" class="font-brute escape-txt out-mid" fill="#000">HUIR AL CAMPAMENTO</text>
      <text y="0" class="font-brute escape-txt" fill="url(#escapeRustGrad)">HUIR AL CAMPAMENTO</text>
    </g>

  </g>
</svg>
