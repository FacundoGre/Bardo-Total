<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Gradiente para "PELEA" (Oro de batalla/Bronce) -->
    <linearGradient id="bronzeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff0b3" />
      <stop offset="25%" stop-color="#e6a100" />
      <stop offset="75%" stop-color="#945200" />
      <stop offset="100%" stop-color="#422000" />
    </linearGradient>

    <!-- Gradiente para "RÁPIDA" (Energía de matcheo / Acción) -->
    <linearGradient id="actionGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffeb3b" />
      <stop offset="30%" stop-color="#ff9800" />
      <stop offset="71%" stop-color="#e64a19" />
      <stop offset="100%" stop-color="#5d1000" />
    </linearGradient>

    <!-- Filtro de Sombra para despegue web -->
    <filter id="fightShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="6" flood-color="#000000" flood-opacity="0.95" />
    </filter>
  </defs>

  <style>
    .font-brute { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; text-anchor: middle; font-style: italic; }
    .pelea-txt { font-size: 110px; letter-spacing: 2px; }
    .rapida-txt { font-size: 85px; letter-spacing: 14px; }
    .out-thick { stroke: #080402; stroke-width: 26px; stroke-linejoin: round; stroke-linecap: round; }
    .out-md { stroke: #1f0b00; stroke-width: 14px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <!-- GRUPO PRINCIPAL CON SOMBRA -->
  <g filter="url(#fightShadow)">
    
    <!-- EFECTO DE IMPACTO TRASERO (Choque de Matcheo) -->
    <g transform="translate(500, 150)">
      <!-- Líneas de velocidad/impacto radiales -->
      <path d="M -150,-80 L -80,-40 M -180,0 L -90,0 M -140,80 L -80,40 M 150,-80 L 80,-40 M 180,0 L 90,0 M 140,80 L 80,40" stroke="#ff9800" stroke-width="6" stroke-linecap="round" opacity="0.7" />
      
      <!-- Destello central amarillo -->
      <circle cx="0" cy="-10" r="45" fill="#ffeb3b" opacity="0.3" filter="blur(5px)" />
      
      <!-- PUÑOS CHOCANDO (Simbolizando el Versus instantáneo) -->
      <!-- Puño Izquierdo -->
      <g transform="translate(-15, -15) scale(0.9)">
        <path d="M -70,-15 C -45,-15 -35,-25 -10,-15 C -5,-10 -5,10 -10,15 C -30,20 -40,10 -70,15 Z" fill="#e0a96d" stroke="#111" stroke-width="6" stroke-linejoin="round"/>
        <!-- Dedos / Nudillos -->
        <path d="M -35,-15 C -25,-15 -20,-5 -25,5 M -45,-12 C -35,-12 -30,-2 -35,8 M -55,-10 C -45,-10 -40,0 -45,10" stroke="#111" stroke-width="4" fill="none"/>
        <!-- Muñequera de cuero típica de El Bruto -->
        <rect x="-95" y="-20" width="30" height="40" rx="3" fill="#5c3a21" stroke="#111" stroke-width="5" />
        <circle cx="-80" cy="-10" r="3" fill="#ddd" />
        <circle cx="-80" cy="10" r="3" fill="#ddd" />
      </g>
      
      <!-- Puño Derecho (Espejado) -->
      <g transform="translate(15, -15) scale(-0.9, 0.9)">
        <path d="M -70,-15 C -45,-15 -35,-25 -10,-15 C -5,-10 -5,10 -10,15 C -30,20 -40,10 -70,15 Z" fill="#c48f5a" stroke="#111" stroke-width="6" stroke-linejoin="round"/>
        <path d="M -35,-15 C -25,-15 -20,-5 -25,5 M -45,-12 C -35,-12 -30,-2 -35,8 M -55,-10 C -45,-10 -40,0 -45,10" stroke="#111" stroke-width="4" fill="none"/>
        <rect x="-95" y="-20" width="30" height="40" rx="3" fill="#422816" stroke="#111" stroke-width="5" />
        <circle cx="-80" cy="-10" r="3" fill="#ddd" />
        <circle cx="-80" cy="10" r="3" fill="#ddd" />
      </g>
    </g>

    <!-- TEXTO: "PELEA" -->
    <g transform="translate(500, 115)">
      <text y="0" class="font-brute pelea-txt out-thick" fill="#000">PELEA</text>
      <text y="0" class="font-brute pelea-txt out-md" fill="#000">PELEA</text>
      <text y="0" class="font-brute pelea-txt" fill="url(#bronzeGrad)">PELEA</text>
    </g>

    <!-- TEXTO: "RÁPIDA" -->
    <g transform="translate(506, 215)"> 
      <!-- Desplazado 6px a la derecha para compensar visualmente el itálica -->
      <text y="0" class="font-brute rapida-txt out-thick" fill="#000">RÁPIDA</text>
      <text y="0" class="font-brute rapida-txt out-md" fill="#000">RÁPIDA</text>
      <text y="0" class="font-brute rapida-txt" fill="url(#actionGrad)">RÁPIDA</text>
    </g>
    
    <!-- DETALLES DE GRIETAS / CHISPAS (Arriba del texto) -->
    <g transform="translate(500, 150)" stroke="#111" stroke-width="4" fill="none">
      <!-- Grieta en la P de Pelea -->
      <path d="M -190,-75 L -175,-60 L -180,-45" stroke-linecap="round"/>
      <!-- Grieta en la A de Rápida -->
      <path d="M 160,40 L 170,55 L 165,70" stroke-linecap="round"/>
    </g>

  </g>
</svg>
