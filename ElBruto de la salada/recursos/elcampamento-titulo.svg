<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="100%" height="100%">
  <defs>
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="30%" stop-color="#d1d5db" />
      <stop offset="70%" stop-color="#6b7280" />
      <stop offset="100%" stop-color="#374151" />
    </linearGradient>

    <linearGradient id="woodGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffb766" />
      <stop offset="25%" stop-color="#df7a27" />
      <stop offset="75%" stop-color="#8c3b00" />
      <stop offset="100%" stop-color="#4a1a00" />
    </linearGradient>

    <linearGradient id="ropeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a17846" />
      <stop offset="50%" stop-color="#dec090" />
      <stop offset="100%" stop-color="#785328" />
    </linearGradient>

    <filter id="headerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.9" />
    </filter>
  </defs>

  <style>
    .font-heavy { font-family: 'Impact', 'Arial Black', sans-serif; font-weight: 900; text-anchor: middle; }
    .el-text { font-size: 55px; letter-spacing: 8px; font-style: italic; }
    .camp-text { font-size: 115px; letter-spacing: 4px; font-style: italic; }
    .stroke-bg { stroke: #0d0703; stroke-width: 22px; stroke-linejoin: round; stroke-linecap: round; }
    .stroke-md { stroke: #1f1107; stroke-width: 12px; stroke-linejoin: round; stroke-linecap: round; }
  </style>

  <g filter="url(#headerShadow)">
    
    <g transform="translate(500, 140)">
      <g transform="translate(0, 40) scale(1.1)" opacity="0.85">
        <path d="M -50,20 L 50,0 M -40,5 L 40,15" stroke="#3d1d06" stroke-width="14" stroke-linecap="round"/>
        <path d="M -30,5 C -30,-40 0,-70 0,-70 C 0,-70 30,-40 30,5 C 20,15 -20,15 -30,5 Z" fill="#ff4500" />
        <path d="M -15,5 C -15,-25 0,-50 0,-50 C 0,-50 15,-25 15,5 C 10,10 -10,10 -15,5 Z" fill="#ffaa00" />
        <path d="M -5,5 C -5,-10 0,-30 0,-30 C 0,-30 5,-10 5,5 Z" fill="#ffffaa" />
      </g>
      
      <g transform="translate(-320, -30) rotate(-20)">
        <line x1="0" y1="80" x2="0" y2="-40" stroke="#875329" stroke-width="5"/>
        <polygon points="0,-40 -10,-20 10,-20" fill="#6b7280"/>
        <path d="M -5,70 L -12,90 L -2,85 L -5,70 M 5,70 L 12,90 L 2,85 L 5,70" fill="#d1d5db"/>
      </g>
      <g transform="translate(340, 20) rotate(45)">
        <line x1="0" y1="80" x2="0" y2="-40" stroke="#875329" stroke-width="5"/>
        <polygon points="0,-40 -10,-20 10,-20" fill="#6b7280"/>
        <path d="M -5,70 L -12,90 L -2,85 L -5,70 M 5,70 L 12,90 L 2,85 L 5,70" fill="#d1d5db"/>
      </g>
    </g>

    <g transform="translate(500, 95)">
      <text y="0" class="font-heavy el-text stroke-bg" fill="#000">EL</text>
      <text y="0" class="font-heavy el-text stroke-md" fill="#000">EL</text>
      <text y="0" class="font-heavy el-text" fill="url(#silverGrad)">EL</text>
    </g>

    <g transform="translate(500, 195)">
      <text y="0" class="font-heavy camp-text stroke-bg" fill="#000">CAMPAMENTO</text>
      <text y="0" class="font-heavy camp-text stroke-md" fill="#000">CAMPAMENTO</text>
      <text y="0" class="font-heavy camp-text" fill="url(#woodGrad)">CAMPAMENTO</text>
    </g>

    <g transform="translate(500, 195)" fill="none" stroke-linecap="round">
      <path d="M -340,-40 L -310,-10" stroke="url(#ropeGrad)" stroke-width="7" />
      <path d="M -335,-45 L -305,-15" stroke="#111" stroke-width="2" />
      
      <circle cx="325" cy="-35" r="6" fill="#4b5563" stroke="#111" stroke-width="3" />
      <circle cx="323" cy="-37" r="2" fill="#9ca3af" />

      <path d="M -150,-10 L -135,-20 M -40,10 L -25,0 M 180,-30 L 195,-20" stroke="#1f1107" stroke-width="4" />
    </g>

  </g>
</svg>
