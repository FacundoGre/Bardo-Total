<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ojo de Dios - Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="controles" style="max-width: 800px; margin-top: 50px;">
        <h2 style="color: #ff3333; font-size: 2em; border-bottom: 2px dashed #4a0000; padding-bottom: 10px;">👁️ EL OJO DE DIOS</h2>
        
        <div id="admin-loading" style="text-align: center; font-weight: bold; color: #888; padding: 30px;">Cruzando datos de los reinos...</div>
        
        <div id="admin-data" style="display: none; padding: 20px;">
            <!-- Panel de Métricas que ya tenías -->
            <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div class="admin-stat-box" style="flex: 1;"><span class="admin-titulo">Gladiadores</span><span id="admin-tot-gladiadores" class="admin-stat-valor">0</span></div>
                <div class="admin-stat-box" style="flex: 1;"><span class="admin-titulo">Combates</span><span id="admin-tot-combates" class="admin-stat-valor">0</span></div>
            </div>
            
            <!-- NUEVO: PANEL DE HERRAMIENTAS DEV -->
            <div style="margin-top: 40px; border-top: 2px solid #ff3333; padding-top: 20px;">
                <h3 style="color:#ff3333; text-align:center;">🛠️ MODO DESARROLLADOR</h3>
                <p style="text-align:center; color:#888; font-size:0.9em;">(Requiere tener una sesión de gladiador activa en otra pestaña)</p>
                
                <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top: 15px;">
                    <button id="dev-oro" class="btn-accion btn-campeon">💰 Darme +10.000 Oro</button>
                    <button id="dev-nivel" class="btn-accion btn-campeon">🌟 Darme +5 Niveles</button>
                    <button id="dev-intentos" class="btn-accion">🔄 Reset 5 Intentos Jefe</button>
                    <button id="dev-bestia" class="btn-accion btn-peligro">🦖 Forzar Nueva Bestia Global</button>
                    <button id="dev-matar-bestia" class="btn-accion" style="background:#111;">💀 Dejar Bestia a 1 HP</button>
                </div>
            </div>
            
            <div style="text-align: center; margin-top: 30px;">
                <a href="index.html" class="btn-accion" style="text-decoration:none;">⬅ Volver a la Arena</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
